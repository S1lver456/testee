<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ALINA OS | WEB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050000; color: #ff4d4d; font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(20, 0, 0, 0.9); border: 1px solid #600; backdrop-filter: blur(10px); }
        .alina-core { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #f00; overflow: hidden; margin: 0 auto; }
        #chat-box { height: 300px; overflow-y: auto; }
    </style>
</head>
<body class="flex flex-col h-screen p-4">
    <div class="glass p-4 rounded-xl max-w-md mx-auto w-full flex-1 flex flex-col">
        <div class="flex justify-between mb-4 text-[10px]">
            <button onclick="setLang('ru')">RU</button>
            <button onclick="setLang('uk')">UA</button>
            <button onclick="setLang('en')">EN</button>
        </div>
        <div class="alina-core mb-4">
            <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3A0dzA1Z3BteWx4bnlhbnA1NmtyYzRyamt1ZXQzZzNxdWljY2pyMiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3oKIPnAiaMCws8nOKY/giphy.gif" class="w-full h-full object-cover">
        </div>
        <div id="chat-box" class="flex-1 space-y-2 text-sm p-2"></div>
        <div class="flex gap-2 mt-4">
            <input type="text" id="user-input" class="flex-1 bg-black border border-red-900 p-2 text-xs focus:outline-none">
            <button onclick="askGemini()" class="bg-red-900 px-4 text-xs font-bold">ASK</button>
        </div>
    </div>

    <script>
        let currentLang = 'ru';
        const API_KEY = "ТВОЙ_КЛЮЧ"; 
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;

        function setLang(l) { currentLang = l; appendMessage('SYSTEM', 'Lang: ' + l); }

        async function askGemini() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim().toLowerCase();
            if(!msg) return;
            appendMessage('YOU', msg);
            input.value = "";

            if (msg.includes("найди") || msg.includes("search") || msg.includes("знайди")) {
                const query = msg.replace(/найди|search|знайди/g, "").trim();
                window.open(`https://google.com/search?q=${encodeURIComponent(query)}`, '_blank');
                appendMessage('ALINA', "Opening search...");
                return;
            }
            fetchGemini(msg);
        }

        async function fetchGemini(msg) {
            const prompts = {
                ru: "Ты Алина, дерзкая. Отвечай на русском.",
                uk: "Ти Аліна, зухвала. Відповідай українською.",
                en: "You are Alina, bold. Answer in English."
            };
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompts[currentLang] + " " + msg }] }] })
                });
                const data = await response.json();
                appendMessage('ALINA', data.candidates[0].content.parts[0].text);
            } catch (e) { appendMessage('SYSTEM', 'Error. Check API Key.'); }
        }

        function appendMessage(s, t) {
            const d = document.createElement('div');
            d.innerHTML = `<span class="opacity-50 text-[10px]">${s}:</span> ${t}`;
            document.getElementById('chat-box').appendChild(d);
            document.getElementById('chat-box').scrollTop = 9999;
        }
    </script>
</body>
</html>
