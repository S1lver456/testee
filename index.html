<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        /* Стили для кнопок переключения языков */
        .lang-btns { position: fixed; top: 10px; right: 10px; display: flex; gap: 5px; z-index: 9999; }
        .lang-btns button { background: #222; color: #ff4d4d; border: 1px solid #600; padding: 5px 12px; cursor: pointer; font-size: 11px; font-family: 'JetBrains Mono', monospace; }
        .lang-btns button:hover { background: #600; color: white; }
        
        /* Твои старые стили для дизайна */
        body { background: #050000; color: #ff4d4d; font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div class="lang-btns">
        <button onclick="setLang('ru')">RU</button>
        <button onclick="setLang('uk')">UA</button>
        <button onclick="setLang('en')">EN</button>
    </div>

    <script>
        let currentLang = 'ru'; // Язык по умолчанию
        const API_KEY = "ТВОЙ_КЛЮЧ_GEMINI";
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;

        function setLang(lang) {
            currentLang = lang;
            const status = {
                ru: "Алина: Теперь я говорю по-русски.",
                uk: "Аліна: Тепер я розмовляю українською.",
                en: "Alina: Now I speak English."
            };
            appendMessage('SYSTEM', status[lang]);
        }

        async function askGemini() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim().toLowerCase();
            if (!msg) return;

            appendMessage('YOU', msg);
            input.value = "";

            // ЛОГИКА БРАУЗЕРА (Поиск работает везде)
            if (msg.includes("найди") || msg.includes("search") || msg.includes("знайди")) {
                const query = msg.replace(/найди|search|знайди/g, "").trim();
                const alinaSearchText = {
                    ru: "Окей, ищу в Google...",
                    uk: "Окей, шукаю в Google...",
                    en: "Okay, searching on Google..."
                };
                appendMessage('ALINA', alinaSearchText[currentLang]);
                window.open(`https://google.com/search?q=${encodeURIComponent(query)}`, '_blank');
                return;
            }

            // Если это не поиск — шлем запрос к нейронке
            fetchGemini(msg);
        }

        async function fetchGemini(msg) {
            const ui = document.getElementById('main-ui');
            if(ui) ui.classList.add('thinking');

            // Настройка промпта под выбранный язык
            const prompts = {
                ru: "Ты Алина, дерзкая и саркастичная помощница. Отвечай на русском.",
                uk: "Ти Аліна, зухвала та саркастична помічниця. Відповідай українською.",
                en: "You are Alina, a bold and sarcastic assistant. Answer in English."
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ 
                            parts: [{ text: `${prompts[currentLang]} Юзер пишет: ${msg}` }] 
                        }] 
                    })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                appendMessage('ALINA', aiText);
                if (typeof speak === 'function') speak(aiText);
            } catch (e) {
                appendMessage('SYSTEM', 'Ошибка подключения. Проверь API ключ или VPN.');
            }
            if(ui) ui.classList.remove('thinking');
        }

        // [Функции appendMessage, toggleMenu и т.д. остаются без изменений]
    </script>
</body>
</html>
